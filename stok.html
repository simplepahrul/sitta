<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Stok SITTA</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container py-4">
      <div
        class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4"
      >
        <div>
          <h2>📚 Informasi Bahan Ajar</h2>
          <p class="text-secondary mb-0">
            Data stok bahan ajar Universitas Terbuka
          </p>
        </div>

        <a href="dashboard.html" class="btn btn-outline-primary">
          ← Dashboard
        </a>
      </div>

      <div class="card border-0 shadow-sm p-3 mb-4">
        <div class="d-flex flex-wrap align-items-center gap-3">
          <input
            type="text"
            id="searchStok"
            class="form-control w-auto flex-grow-1"
            placeholder="Cari bahan ajar..."
            onkeyup="searchStok()"
          />

          <button
            class="btn btn-primary ms-auto"
            data-bs-toggle="modal"
            data-bs-target="#modalTambahStok"
          >
            + Tambah Stok
          </button>
        </div>
      </div>

      <div class="table-responsive">
        <table id="stokTable" class="table table-striped table-hover">
          <thead class="table-primary">
            <tr>
              <th>No</th>
              <th>Cover</th>
              <th>Kode</th>
              <th>Nama Barang</th>
              <th>Jenis</th>
              <th>Edisi</th>
              <th>Stok</th>
            </tr>
          </thead>

          <tbody id="stokTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Modal -->

    <div class="modal fade" id="modalTambahStok">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Tambah Data Stok</h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body d-flex flex-column gap-3">
            <input
              type="text"
              id="kodeBarang"
              class="form-control"
              placeholder="Kode Barang"
            />

            <input
              type="text"
              id="namaBarang"
              class="form-control"
              placeholder="Nama Barang"
            />

            <input
              type="text"
              id="jenisBarang"
              class="form-control"
              placeholder="Jenis Barang"
            />

            <input
              type="text"
              id="edisiBarang"
              class="form-control"
              placeholder="Edisi"
            />

            <input
              type="number"
              id="stokBarang"
              class="form-control"
              placeholder="Jumlah Stok"
            />

            <input
              type="text"
              id="coverBarang"
              class="form-control"
              placeholder="Nama File Cover"
            />
          </div>

          <div class="modal-footer">
            <button class="btn btn-primary" onclick="tambahStok()">
              Simpan Data
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
    <script>
      window.addEventListener("load", function () {
        updateTableTheme();
      });
    </script>
  </body>
</html>
