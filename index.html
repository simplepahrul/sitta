<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SITTA Login</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container-fluid login-page">
      <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-lg-4 col-md-6 col-11">
          <div class="login-card">
            <div class="text-center mb-4">
              <img
                src="https://www.ut.ac.id/wp-content/uploads/2015/11/logo-ut-small-transparent-300x226.png"
                class="logo-ut"
                alt="Logo UT"
              />

              <h1 class="mt-3">SITTA</h1>

              <p class="text-secondary">
                Sistem Informasi Tiras dan <br />Transaksi Bahan Ajar
              </p>
            </div>

            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">Email</label>

                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder="contoh@ut.ac.id"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>

                <input
                  type="password"
                  id="password"
                  class="form-control"
                  placeholder="Masukkan password"
                  required
                />
              </div>

              <button class="btn btn-primary w-100 py-2">Login</button>
            </form>

            <div class="d-flex justify-content-between mt-3">
              <button
                class="btn btn-link text-decoration-none p-0"
                data-bs-toggle="modal"
                data-bs-target="#forgotModal"
              >
                Lupa Password
              </button>

              <button
                class="btn btn-link text-decoration-none p-0"
                data-bs-toggle="modal"
                data-bs-target="#registerModal"
              >
                Daftar
              </button>
            </div>

            <button id="themeToggle" class="btn btn-light w-100 mt-4">
              🌙 Dark Mode
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Forgot -->

    <div class="modal fade" id="forgotModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Lupa Password</h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            Silakan hubungi admin SITTA untuk reset password.
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Register -->

    <div class="modal fade" id="registerModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Daftar Akun</h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            Pendaftaran akun dilakukan melalui bagian administrasi UT.
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
